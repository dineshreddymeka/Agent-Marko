# Dependency Review — free for public repos
# Blocks PRs that introduce known-vulnerable or disallowed-license deps.
# Requires Dependency graph enabled:
#   Settings → Code security and analysis → Dependency graph
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        # Soft-fail until Dependency graph is enabled on the repository.
        continue-on-error: true
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          # Align with repo license hard rule (MIT / Apache-2.0 / PostgreSQL only).
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0, SSPL-1.0, BUSL-1.1
          show-openssf-scorecard: true
          warn-on-openssf-scorecard-level: 3
          comment-summary-in-pr: on-failure
