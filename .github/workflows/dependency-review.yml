# Dependency Review — free for public repos
# Blocks PRs that introduce known-vulnerable or disallowed-license deps.
# Requires Dependency graph enabled:
#   Settings → Code security and analysis → Dependency graph
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          # Strict SCA: block any introduced advisory severity, including low.
          fail-on-severity: low
          fail-on-scopes: runtime,development
          # Allowlist only (mutually exclusive with deny-licenses).
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, Unlicense, CC0-1.0, PostgreSQL, BlueOak-1.0.0, Python-2.0, Zlib
          show-openssf-scorecard: true
          warn-on-openssf-scorecard-level: 5
          comment-summary-in-pr: always
