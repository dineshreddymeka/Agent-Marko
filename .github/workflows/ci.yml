name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Unit + offline verifiers (no Docker). Windows PATH helpers are unused on ubuntu.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Unit tests
        run: bun test app server packages/shared

      - name: Build app
        run: bun run --filter app build

      - name: Phase 3 verify (mock AG-UI)
        run: bun run verify:phase3

      - name: Offline debug buffer smoke
        run: bun run verify:offline

      - name: A2UI demo scenarios
        run: bun run verify:a2ui

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Playwright smoke
        run: bun run test:e2e

  # Postgres 17 + pgvector: migrate + repository integration tests
  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg17
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes
          POSTGRES_DB: hermes
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hermes"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Migrate
        env:
          DATABASE_URL: postgres://hermes:hermes@localhost:5433/hermes
        run: bun run migrate

      - name: DB integration tests
        env:
          DATABASE_URL: postgres://hermes:hermes@localhost:5433/hermes
          HERMES_INTEGRATION_TEST: "1"
        run: bun test server/test/db.integration.test.ts

  # Free Snyk Open Source + Code scans (https://snyk.io — Free plan).
  # Add repo secret SNYK_TOKEN (Account Settings → General → API Token).
  # Job skips cleanly until the secret is configured.
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - uses: snyk/actions/setup@8e119fbb6c251787721d34ba683ed48eba792766 # master

      - name: Install dependencies
        run: bun install

      - name: Snyk Open Source (dependencies)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::notice::SNYK_TOKEN not set — skipping. Create a free Snyk account at https://app.snyk.io and add the API token as repo secret SNYK_TOKEN."
            exit 0
          fi
          # Strict SCA: fail on low+ severity across all workspace projects.
          snyk test --all-projects --severity-threshold=low --fail-on=all

      - name: Snyk Code (SAST)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            exit 0
          fi
          snyk code test --severity-threshold=low

      - name: Snyk monitor (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            exit 0
          fi
          snyk monitor --all-projects

  # Free SonarCloud / SonarQube Cloud (https://sonarcloud.io — Free / OSS plan).
  # Full monorepo scan (app/server/shared/scripts/migrations/workflows) + coverage + quality gate.
  # 1) Import this GitHub repo at https://sonarcloud.io/projects/create
  # 2) Align sonar.organization + sonar.projectKey in sonar-project.properties
  # 3) Add repo secret SONAR_TOKEN (My Account → Security → Generate Token)
  # Job skips cleanly until the secret is configured.
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Check SONAR_TOKEN
        id: sonar_token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN not set — skipping. Create a free SonarCloud project at https://sonarcloud.io and add the token as repo secret SONAR_TOKEN."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.sonar_token.outputs.present == 'true'
        run: bun install

      - name: Unit tests with LCOV coverage
        if: steps.sonar_token.outputs.present == 'true'
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage app server packages/shared

      - name: SonarCloud Scan (full project, quality gate enforced)
        if: steps.sonar_token.outputs.present == 'true'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.verbose=false
