services:
  postgres:
    # pgvector/pgvector:0.8.5-pg17 — Artifactory-verified (pin digest when available)
    image: pgvector/pgvector:0.8.5-pg17
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes
    volumes:
      - ${HERMES_DATA_DIR:-C:/hermes-data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hermes']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
