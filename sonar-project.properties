sonar.projectVersion=0.2.0

# Root as sources so app/server/shared/scripts/migrations/workflows/compose are all included.
sonar.sources=.
sonar.inclusions=\
  **/*.ts,\
  **/*.tsx,\
  **/*.js,\
  **/*.jsx,\
  **/*.mjs,\
  **/*.cjs,\
  **/*.sql,\
  **/*.yml,\
  **/*.yaml

# Tests: unit suites + Playwright e2e + colocated *.test.ts under shared.
sonar.tests=.
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  e2e/**/*.ts

# Keep vendor/build/generated/tests out of product sources.
sonar.exclusions=\
  **/node_modules/**,\
  **/.tmp/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/test-results/**,\
  **/playwright-report/**,\
  **/*.gen.ts,\
  **/routeTree.gen.ts,\
  bun.lock,\
  **/bun.lock,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  e2e/**,\
  app/test/**,\
  server/test/**,\
  packages/shared/test/**

sonar.test.exclusions=\
  **/node_modules/**,\
  **/.tmp/**,\
  **/dist/**,\
  **/coverage/**

sonar.coverage.exclusions=\
