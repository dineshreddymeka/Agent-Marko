# SonarQube Enterprise analysis config (see docs/SECURITY-SCANNING.md).
# Point your Enterprise Sonar scanner at this file. Host URL and token live in
# your enterprise secret store only — never commit them here.

sonar.projectKey=hermes-ui
sonar.projectName=hermes-ui

sonar.sources=app/src,server/src,packages/shared/src
sonar.sourceEncoding=UTF-8

# Generated artifacts, deps, test reports, Vite caches
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.gen.ts,**/test-results/**,**/playwright-report/**,**/.vite/**

# TypeScript / JavaScript analysis (monorepo tsconfigs)
sonar.typescript.tsconfigPath=app/tsconfig.json,server/tsconfig.json,packages/shared/tsconfig.json
