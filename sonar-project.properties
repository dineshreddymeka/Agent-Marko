# SonarCloud — full-project analysis (do not miss app/server/shared/scripts/migrations/workflows).
# Match organization/projectKey to the values shown after importing this GitHub repo.
sonar.projectKey=dineshreddymeka_Agent-Marko
sonar.organization=dineshreddymeka
sonar.projectName=Agent-Marko
sonar.projectVersion=0.2.0

# Analyze the whole monorepo surface (TS/TSX/JS + SQL + YAML).
sonar.sources=app/src,server/src,packages/shared/src,scripts,server/migrations,.github,docker-compose.yml
sonar.inclusions=\
  **/*.ts,\
  **/*.tsx,\
  **/*.js,\
  **/*.jsx,\
  **/*.mjs,\
  **/*.cjs,\
  **/*.sql,\
  **/*.yml,\
  **/*.yaml

# Tests include unit suites + Playwright e2e specs + colocated *.test.ts under shared.
sonar.tests=app/test,server/test,packages/shared/test,packages/shared/src,e2e
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  e2e/**/*.ts

# Keep generated/vendor/build out of sources AND coverage.
sonar.exclusions=\
  **/node_modules/**,\
  **/.tmp/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/test-results/**,\
  **/playwright-report/**,\
  **/*.gen.ts,\
  **/routeTree.gen.ts,\
  bun.lock,\
  **/bun.lock,\
  app/test/**,\
  server/test/**,\
  packages/shared/test/**,\
  e2e/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  e2e/**,\
  **/*.gen.ts,\
  **/routeTree.gen.ts,\
  scripts/**,\
  server/migrations/**,\
  .github/**,\
  **/main.tsx,\
  **/vite-env.d.ts,\
  **/index.ts

sonar.cpd.exclusions=\
  **/*.gen.ts,\
  **/routeTree.gen.ts,\
  server/migrations/**

# Multi-package TS configs so nothing is skipped by the analyzer.
sonar.typescript.tsconfigPaths=\
  tsconfig.json,\
  app/tsconfig.json,\
  server/tsconfig.json,\
  packages/shared/tsconfig.json,\
  tsconfig.base.json

# Coverage from CI (`bun test --coverage --coverage-reporter=lcov`).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverageReportPaths=coverage/lcov.info

# Quality / SCM — wait for gate so nothing “green” slips past a failed gate.
sonar.qualitygate.wait=true
sonar.scm.provider=git
sonar.sourceEncoding=UTF-8
sonar.javascript.node.maxspace=8192

# Pull request / branch analysis uses SONAR_TOKEN + GITHUB_TOKEN from the workflow.
