# Open Jarvis desktop Docker Postgres 17 tuning (pgvector/pgvector:0.8.5-pg17).
# Author: Dinesh Reddy Meka
# Applied via docker-compose `command: postgres -c ...` (image entrypoint stays intact).
#
# Assumptions: Docker Desktop with ~4–8 GiB RAM for containers, SSD-backed
# HERMES_DATA_DIR, single local Open Jarvis server (Bun.sql pool max ≤ 10).
# Compose sets shm_size: 256mb so shared_buffers=256MB fits in /dev/shm.

shared_buffers = 256MB
work_mem = 16MB
effective_cache_size = 1GB
maintenance_work_mem = 128MB
random_page_cost = 1.1
max_connections = 50
wal_level = replica
max_wal_size = 512MB
log_min_duration_statement = 500
